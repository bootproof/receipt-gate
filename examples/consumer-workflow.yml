# Example consumer workflow — drop into your repo's .github/workflows/
# For production gates, pin to a commit SHA instead of @v1 (see README).

name: receipt-gate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prove-it-runs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No setup-node needed — Receipt Gate sets up Node 20 internally.
      - name: Require proof of boot
        id: gate
        uses: bootproof/receipt-gate@v1
        with:
          path: .
          timeout: '60000'
          # require-health defaults to 'true' — observed HTTP health signal required.
          # Set to 'false' only if you accept process-only boot (e.g. a worker with no HTTP).
          # require-health: 'true'

      - name: Surface receipt on the PR
        if: always()
        run: |
          echo "booted=${{ steps.gate.outputs.booted }}" >> $GITHUB_STEP_SUMMARY
          echo "health-verified=${{ steps.gate.outputs.health-verified }}" >> $GITHUB_STEP_SUMMARY
          echo "failure-class=${{ steps.gate.outputs.failure-class }}" >> $GITHUB_STEP_SUMMARY
          echo "attestation-path=${{ steps.gate.outputs.attestation-path }}" >> $GITHUB_STEP_SUMMARY
