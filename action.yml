name: 'Receipt Gate'
description: 'Hard gate: no merge without observed health. For advisory reporting without blocking, use the BootProof action.'
author: 'bootproof'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to the application within the repository'
    required: false
    default: '.'
  timeout:
    description: 'Health verification timeout in milliseconds'
    required: false
    default: '60000'
  install:
    description: 'Run the dependency install step before booting'
    required: false
    default: 'true'
  require-health:
    description: 'Require an observed HTTP health signal (not just a running process). Default: true. Set to false to accept process-only boot.'
    required: false
    default: 'true'
  bootproof-version:
    description: 'Pinned bootproof version from npm'
    required: false
    default: '0.3.0'

outputs:
  booted:
    description: 'true if an observed boot signal exists'
    value: ${{ steps.gate.outputs.booted }}
  health-verified:
    description: 'true if an HTTP health signal was observed'
    value: ${{ steps.gate.outputs.health-verified }}
  failure-class:
    description: 'BootProof failure classification when not booted'
    value: ${{ steps.gate.outputs.failure-class }}
  attestation-path:
    description: 'Path to the signed ed25519 attestation (the receipt)'
    value: ${{ steps.gate.outputs.attestation-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - id: gate
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_INSTALL: ${{ inputs.install }}
        INPUT_REQUIRE_HEALTH: ${{ inputs.require-health }}
        INPUT_BOOTPROOF_VERSION: ${{ inputs['bootproof-version'] }}
      run: bash "${{ github.action_path }}/gate.sh"

    - name: Upload signed receipt
      if: always() && steps.gate.outputs.attestation-path != ''
      uses: actions/upload-artifact@v4
      with:
        name: boot-receipt
        path: ${{ steps.gate.outputs.attestation-path }}
        if-no-files-found: ignore
        # 2555 days ≈ 7 years. Supports audit timelines (EU AI Act, NIST AI RMF).
        # Consumers who need longer retention should download and archive externally.
        retention-days: 2555
